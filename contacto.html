<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACTO — ESTUDIONEGRO MASTERS</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%;
      background:#fff; color:#000;
      font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    }

    /* ── top bar ── */
    .topbar {
      display:flex; align-items:baseline; justify-content:space-between;
      padding:16px 16px 12px;
      border-bottom:2px solid #000;
    }
    @media(min-width:600px){ .topbar { padding:18px 26px 12px; } }
    .back {
      font-weight:900; font-size:clamp(1.1rem,3.5vw,2rem);
      letter-spacing:-0.02em; color:#000; text-decoration:none;
      display:inline-block; transform:scaleX(0.96); transform-origin:left center;
    }
    .back:hover { opacity:0.4; }
    .page-title {
      font-weight:900; font-size:clamp(1.1rem,3.5vw,2rem);
      letter-spacing:-0.02em; display:inline-block;
      transform:scaleX(0.96); transform-origin:right center;
    }

    /* ── body ── */
    .body {
      padding:52px 16px 60px;
      display:flex; flex-direction:column;
      gap:0;
    }
    @media(min-width:600px){ .body { padding:64px 26px 80px; } }

    /* engineers */
    .engineers {
      display:flex; flex-direction:column;
      gap:2px;
      margin-bottom:48px;
    }
    .eng {
      font-weight:900;
      font-size:clamp(1.6rem,5vw,3.8rem);
      letter-spacing:-0.02em;
      line-height:1;
      display:inline-block;
      transform:scaleX(0.96);
      transform-origin:left center;
      color:#000;
    }
    .eng-city {
      font-size:clamp(1.6rem,5vw,3.8rem);
      font-weight:900;
      letter-spacing:-0.02em;
      line-height:1;
      color:#ccc;
      display:inline;
    }

    /* formats */
    .formats {
      font-family:'DM Mono',monospace;
      font-size:0.65rem;
      letter-spacing:0.2em;
      color:#aaa;
      margin-bottom:40px;
      font-weight:400;
    }

    /* cta text */
    .cta-text {
      font-size:clamp(0.85rem,1.8vw,1rem);
      font-weight:400;
      color:#888;
      letter-spacing:0.01em;
      margin-bottom:32px;
      line-height:1.5;
    }

    /* email */
    .email {
      font-weight:900;
      font-size:clamp(1rem,3vw,2rem);
      letter-spacing:-0.02em;
      color:#000; text-decoration:none;
      display:inline-block;
      transform:scaleX(0.96); transform-origin:left center;
      border-bottom:2px solid #000;
      padding-bottom:1px;
      transition:opacity 0.15s;
    }
    .email:hover { opacity:0.35; }
  </style>
</head>
<body>

<div class="topbar">
  <a class="back" href="index.html">← ESTUDIONEGRO MASTERS</a>
  <span class="page-title">CONTACTO</span>
</div>

<div class="body">

  <div class="engineers">
    <div>
      <span class="eng">Fernando Herrera</span>
      <span class="eng-city"> · CDMX</span>
    </div>
    <div>
      <span class="eng">Manuel Ortúzar</span>
      <span class="eng-city"> · BLN</span>
    </div>
  </div>

  <div class="formats">.wav · .aiff · .flac</div>

  <div class="cta-text">Escríbenos para agendar o recibir info.</div>

  <a class="email" href="mailto:contacto@estudionegro.io">
    contacto@estudionegro.io
  </a>

</div>

</body>
</html>
