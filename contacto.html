<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACTO — ESTUDIONEGRO MASTERS</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      background:#fff; color:#000;
      font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
      -webkit-text-size-adjust:100%; /* evita que iOS infle texto */
    }

    .topbar {
      display:flex; align-items:baseline; justify-content:space-between;
      padding:16px 16px 12px;
      border-bottom:2px solid #000;
    }
    @media(min-width:600px){ .topbar { padding:18px 26px 12px; } }

    .back {
      font-weight:900; font-size:clamp(1.1rem,3.5vw,2rem);
      letter-spacing:-0.02em; color:#000; text-decoration:none;
      display:inline-block;
      transform:scaleX(0.96); transform-origin:left center;
      -webkit-tap-highlight-color:transparent;
    }
    .back:hover { opacity:0.4; }

    .page-title {
      font-weight:900; font-size:clamp(1.1rem,3.5vw,2rem);
      letter-spacing:-0.02em;
      display:inline-block;
      transform:scaleX(0.96); transform-origin:right center;
    }

    .body {
      padding:48px 16px 80px;
      max-width:520px;
    }
    @media(min-width:600px){ .body { padding:56px 26px 80px; } }

    .intro {
      font-size:1rem;
      font-weight:400;
      color:#666;
      line-height:1.6;
      margin-bottom:12px;
    }

    a.email {
      display:inline-block; /* tap target más fácil */
      font-size:1rem;
      font-weight:700;
      color:#000;
      text-decoration:none;
      letter-spacing:-0.01em;
      padding:4px 0; /* tap target vertical */
      -webkit-tap-highlight-color:transparent;
    }
    a.email:hover { opacity:0.4; }

    .team { margin-top:48px; }

    .team-label {
      font-size:0.65rem; /* mínimo legible en todos los browsers */
      font-weight:400;
      letter-spacing:0.2em;
      color:#aaa;
      text-transform:uppercase;
      margin-bottom:16px;
    }

    .person {
      display:block;
      font-weight:700;
      font-size:clamp(1.1rem,2.8vw,1.6rem);
      letter-spacing:-0.02em;
      line-height:1.15;
      color:#000;
      text-decoration:none;
      padding:8px 0; /* tap target 44px aprox en móvil */
      -webkit-tap-highlight-color:transparent;
    }
    .person:hover { opacity:0.4; }
    .person + .person { margin-top:0; }

    .city {
      font-weight:700;
      color:#ccc;
    }
  </style>
</head>
<body>

<div class="topbar">
  <a class="back" href="index.html">← ESTUDIONEGRO MASTERS</a>
  <span class="page-title">CONTACTO</span>
</div>

<div class="body">

  <p class="intro">Para agendar una sesión, consultar tarifas o recibir más información, escribe a:</p>
  <a class="email" href="mailto:contacto@estudionegro.io">contacto@estudionegro.io</a>

  <div class="team">
    <div class="team-label">Nuestro equipo</div>
    <div>
      <a class="person" href="https://www.instagram.com/fernandoherrerabastidas/" target="_blank" rel="noopener noreferrer">
        Fernando Herrera<span class="city"> · CDMX</span>
      </a>
      <a class="person" href="https://www.instagram.com/aural_trace/" target="_blank" rel="noopener noreferrer">
        Manuel Ortúzar<span class="city"> · BLN</span>
      </a>
    </div>
  </div>

</div>

</body>
</html>
