  <title>PORTAFOLIO — ESTUDIONEGRO MASTERS</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html {
      background:#fff; color:#000;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
    }
    body { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; }

    /* topbar */
    .topbar {
      display:flex; align-items:baseline; justify-content:space-between;
      padding:16px 16px 12px;
      border-bottom:2px solid #000;
    }
    @media(min-width:700px){ .topbar { padding:18px 26px 12px; } }
    .back {
      font-weight:900; font-size:clamp(1.1rem,3.5vw,2rem);
      letter-spacing:-0.02em; color:#000; text-decoration:none;
      display:inline-block;
      transform:scaleX(0.96); transform-origin:left center;
      -webkit-tap-highlight-color:transparent;
    }
    .back:hover { opacity:0.5; }
    .page-title {
      font-weight:900; font-size:clamp(1.1rem,3.5vw,2rem);
      letter-spacing:-0.02em; display:inline-block;
      transform:scaleX(0.96); transform-origin:right center;
    }

    /* ── STAGE: negro en desktop, blanco en mobile ── */
    .stage {
      background:#000;
      /* mobile: solo muestra la carátula */
      padding:0;
    }
    @media(min-width:700px){
      .stage {
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        min-height:calc(82vh - 56px);
        padding:36px 40px 28px;
        gap:20px;
      }
    }

    /* carátula — cuadrada siempre */
    .slide-wrap {
      position:relative;
      overflow:hidden;
      background:#111;
      /* mobile: full width */
      width:100%;
      aspect-ratio:1/1;
    }
    @media(min-width:700px){
      .slide-wrap {
        width:min(52vh,480px);
        aspect-ratio:1/1;
        flex-shrink:0;
      }
    }

    .slide {
      position:absolute; inset:0;
      opacity:0; transition:opacity 1s ease;
    }
    .slide.active { opacity:1; }
    .slide img {
      width:100%; height:100%;
      object-fit:cover; display:block;
    }

    /* texto — blanco en desktop, negro en mobile */
    .slide-info {
      text-align:center;
      /* mobile */
      padding:14px 16px 18px;
      background:#fff;
      border-bottom:2px solid #000;
    }
    @media(min-width:700px){
      .slide-info {
        background:transparent;
        border-bottom:none;
        padding:0;
      }
    }

    .slide-artist {
      font-weight:900;
      font-size:clamp(1.2rem,4.5vw,2.6rem);
      letter-spacing:-0.02em; line-height:1;
      color:#000;
      display:inline-block;
      transform:scaleX(0.96);
      transition:opacity 0.4s;
      margin-bottom:5px;
    }
    @media(min-width:700px){ .slide-artist { color:#fff; } }

    .slide-track {
      font-weight:400;
      font-size:clamp(0.85rem,2vw,1.1rem);
      color:#666;
      letter-spacing:-0.01em;
      transition:opacity 0.4s;
      margin-bottom:3px;
    }
    @media(min-width:700px){ .slide-track { color:#aaa; } }

    .slide-year {
      font-size:0.65rem;
      font-weight:400;
      letter-spacing:0.12em;
      color:#bbb;
      transition:opacity 0.4s;
    }
    @media(min-width:700px){ .slide-year { color:#555; } }

    /* ── EXPAND ── */
    .p-hdr {
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 16px;
      cursor:pointer;
      user-select:none;
      border-bottom:1px solid #e0e0e0;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }
    @media(min-width:700px){ .p-hdr { padding:20px 26px; } }
    .p-hdr:hover { background:#f5f5f5; }
    .p-hdr-title {
      font-weight:900;
      font-size:clamp(1.1rem,3.5vw,2rem);
      letter-spacing:-0.02em; line-height:1;
      display:inline-block;
      transform:scaleX(0.96); transform-origin:left center;
    }
    .p-hdr-sub {
      font-size:0.58rem; font-weight:400;
      letter-spacing:0.18em; color:#aaa;
      text-transform:uppercase; margin-top:4px;
    }
    .p-arrow {
      font-size:clamp(1.2rem,3vw,2rem);
      font-weight:900; flex-shrink:0;
      transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .p-arrow.open { transform:rotate(180deg); }
    .p-list { display:none; }
    .p-list.open { display:block; }
    .m-entry {
      display:grid;
      grid-template-columns:1fr clamp(72px,18vw,140px);
      gap:12px; align-items:start;
      padding:14px 16px;
      border-bottom:0.5px solid #e8e8e8;
    }
    @media(min-width:700px){ .m-entry { padding:18px 26px; gap:20px; } }
    .m-artist { font-weight:700; font-size:clamp(0.9rem,2.2vw,1.1rem); letter-spacing:-0.01em; margin-bottom:4px; }
    .m-track  { font-size:clamp(0.78rem,1.8vw,0.9rem); color:#888; line-height:1.5; }
    .m-cover  { aspect-ratio:1; width:100%; background:#eee; overflow:hidden; }
    .m-cover img { width:100%; height:100%; object-fit:cover; display:block; }
  </style>
</head>

  elY.textContent=COVERS[i].y||'';
}

function advance(){
  slides[cur].classList.remove('active');
  cur=(cur+1)%slides.length;
  slides[cur].classList.add('active');
  [elA,elT,elY].forEach(function(e){e.style.opacity='0';});
  setTimeout(function(){setText(cur);[elA,elT,elY].forEach(function(e){e.style.opacity='1';});},400);
}

buildSlides(FALLBACK);
fetch('/api/masters')
  .then(function(r){return r.json();})
  .then(function(d){if(Array.isArray(d)&&d.length) buildSlides(d);})
  .catch(function(){});

var pList=document.getElementById('p-list'),
    pArrow=document.getElementById('p-arrow'),
    built=false;
document.getElementById('p-hdr').addEventListener('click',function(){
  if(!built){
    MASTERS.forEach(function(d){
      var e=document.createElement('div');
      e.className='m-entry';
      var img=d.i?'<img src="'+d.i+'" alt="'+d.a+'" loading="lazy">':'';
      e.innerHTML='<div><div class="m-artist">'+d.a+'</div><div class="m-track">'+d.t+'<br>'+d.y+'</div></div><div class="m-cover">'+img+'</div>';
      pList.appendChild(e);
    });
    built=true;
  }
  pList.classList.toggle('open');
  pArrow.classList.toggle('open');
  if (pList.classList.contains('open')) {
    setTimeout(function() {
      document.getElementById('p-hdr').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
});

// ── film grain ────────────────────────────────────────────────────────────
(function(){
  var stage = document.getElementById('stage');
  if (!stage) return;
  var cv = document.createElement('canvas');
  cv.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0.055;z-index:2;';
  stage.style.position = 'relative';
  stage.appendChild(cv);
  var ctx = cv.getContext('2d');
  var frame = 0;

  function grain() {
    frame++;
    if (frame % 3 === 0) { // update every 3 frames — film rate feel
      var w = stage.offsetWidth, h = stage.offsetHeight;
      if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
      var id = ctx.createImageData(w, h), d = id.data;
      for (var i = 0; i < d.length; i += 4) {
        var v = Math.random() * 255 | 0;
        d[i] = d[i+1] = d[i+2] = v;
        d[i+3] = 255;
      }
      ctx.putImageData(id, 0, 0);
    }
    requestAnimationFrame(grain);
  }
  grain();
})();

</script>
