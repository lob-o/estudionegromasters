    .topbar {

      letter-spacing:-0.02em; color:#000; text-decoration:none;

    .back:hover { opacity:0.4; }
    .page-title {
      font-weight:900; font-size:clamp(1.1rem,3.5vw,2rem);
      letter-spacing:-0.02em; display:inline-block;
      transform:scaleX(0.96); transform-origin:right center;
    }

    /* ── cover grid ── */
    .grid {
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:2px;
    }
    @media(min-width:500px){ .grid { grid-template-columns:repeat(4,1fr); } }
    @media(min-width:800px){ .grid { grid-template-columns:repeat(6,1fr); } }
    @media(min-width:1100px){ .grid { grid-template-columns:repeat(8,1fr); } }

    .cover-item {
      aspect-ratio:1;
      overflow:hidden;
      background:#111;
      position:relative;
      cursor:default;
    }
    .cover-item img {
      width:100%; height:100%;
      object-fit:cover; display:block;
      transition:transform 0.3s ease;
    }
    .cover-item:hover img { transform:scale(1.04); }

    /* hover label */
    .cover-label {
      position:absolute; inset:0;
      background:rgba(0,0,0,0.72);
      display:flex; flex-direction:column;
      align-items:flex-start; justify-content:flex-end;
      padding:8px;
      opacity:0; transition:opacity 0.2s ease;
    }
    .cover-item:hover .cover-label { opacity:1; }
    .cover-label .cl-artist {
      font-size:clamp(0.55rem,1.2vw,0.72rem);
      font-weight:700; color:#fff;
      line-height:1.2; letter-spacing:-0.01em;
    }
    .cover-label .cl-track {
      font-size:clamp(0.5rem,1vw,0.62rem);
      font-weight:400; color:rgba(255,255,255,0.65);
      line-height:1.2; margin-top:2px;
    }

    /* ── sub-nav ── */
    .subnav {
      border-top:2px solid #000;
      display:flex;
    }
    .subnav a {
      flex:1;
      display:flex; flex-direction:column; align-items:flex-start;
      padding:20px 16px 22px;
      text-decoration:none; color:#000;
      border-right:1px solid #000;
      transition:background 0.15s;
    }
    @media(min-width:600px){ .subnav a { padding:24px 26px 28px; } }
    .subnav a:last-child { border-right:none; }
    .subnav a:hover { background:#f5f5f5; }
    .sn-label {
      font-size:0.58rem; letter-spacing:0.2em; color:#aaa;

    .sn-title {
