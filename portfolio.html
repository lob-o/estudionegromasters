// ── slideshow ─────────────────────────────────────────────────────────────
var wrap   = document.getElementById('slide-wrap');
var artist = document.getElementById('slide-artist');
var track  = document.getElementById('slide-track');
var year   = document.getElementById('slide-year');
var slides = [];
var cur    = 0;

// preload and build slides
COVERS.forEach(function(c, i) {
  var div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  var img = document.createElement('img');
  img.src = c.i; img.alt = c.a;
  if (i > 0) img.loading = 'lazy';
  div.appendChild(img);
  wrap.appendChild(div);
  slides.push(div);
});

// set initial text
artist.textContent = COVERS[0].a;
track.textContent  = COVERS[0].t;
year.textContent   = COVERS[0].y || '';

function advance() {
  slides[cur].classList.remove('active');
  cur = (cur + 1) % slides.length;
  slides[cur].classList.add('active');

  // fade text: hide, update, show
  artist.style.opacity = '0';
  track.style.opacity  = '0';
  setTimeout(function() {
    artist.textContent  = COVERS[cur].a;
    track.textContent   = COVERS[cur].t;
    year.textContent    = COVERS[cur].y || '';
    artist.style.transition = 'opacity 0.5s';
    track.style.transition  = 'opacity 0.5s';
    year.style.transition   = 'opacity 0.5s';
    artist.style.opacity = '1';
    track.style.opacity  = '1';
    year.style.opacity   = '1';
  }, 400);
}

setInterval(advance, 3800); // 3.8s per slide

// ── expand list ───────────────────────────────────────────────────────────
var pList  = document.getElementById('p-list');
var pArrow = document.getElementById('p-arrow');
var pHdr   = document.getElementById('p-hdr');
var built  = false;

function buildList() {
  MASTERS.forEach(function(d) {
    var img = d.i ? '<img src="'+d.i+'" alt="'+d.a+'" loading="lazy" decoding="async">' : '';
    var entry = document.createElement('div');
    entry.className = 'm-entry';
    entry.innerHTML =
      '<div>' +
        '<div class="m-artist">'+d.a+'</div>' +
        '<div class="m-track">'+d.t+'<br>'+d.y+'</div>' +
      '</div>' +
      '<div class="m-cover">'+img+'</div>';
    pList.appendChild(entry);
  });
  built = true;
}

pHdr.addEventListener('click', function() {
  if (!built) buildList();
  pList.classList.toggle('open');
  pArrow.classList.toggle('open');
});
</script>
