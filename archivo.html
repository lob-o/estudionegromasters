// ── build UI ────────────────────────────────────────────────────────
var years = [];
DATA.forEach(function(p){ if(years.indexOf(p.y)<0) years.push(p.y); });
years.sort(function(a,b){ return b-a; });

var byYear = {};
DATA.forEach(function(p){ if(!byYear[p.y]) byYear[p.y]=[]; byYear[p.y].push(p); });

// filter
var filterEl = document.getElementById('filter');
function makeBtn(label, val) {
  var b = document.createElement('button');
  b.className = 'yr-btn' + (val==='all'?' on':'');
  b.textContent = label;
  b.onclick = function() {
    document.querySelectorAll('.yr-btn').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    document.querySelectorAll('.yr-section').forEach(function(s){
      s.classList.toggle('hidden', val!=='all' && s.dataset.year!==String(val));
    });
    if(val!=='all'){
      var sec=document.querySelector('.yr-section[data-year="'+val+'"]');
      if(sec) sec.scrollIntoView({behavior:'smooth',block:'start'});
    }
  };
  return b;
}
filterEl.appendChild(makeBtn('TODOS','all'));
years.forEach(function(y){ filterEl.appendChild(makeBtn(y,y)); });

// content
var content = document.getElementById('content');
var coverEls = []; // [{imgEl, artist, track}] for lazy loading

years.forEach(function(y) {
  var items = byYear[y];
  var sec = document.createElement('div');
  sec.className = 'yr-section';
  sec.dataset.year = y;

  var hdr = document.createElement('div');
  hdr.className = 'yr-header';
  hdr.innerHTML = '<span class="yr-label">'+y+'</span><span class="yr-count">'+items.length+' track'+(items.length>1?'s':'')+'</span>';
  sec.appendChild(hdr);

  items.forEach(function(p) {
    var row = document.createElement('div');
    row.className = 'entry';

    var info = document.createElement('div');
    info.className = 'e-info';
    info.innerHTML =
      '<div class="e-artist">'+p.a+'</div>'+
      (p.t ? '<div class="e-track">'+p.t+'</div>' : '')+
      '<div class="e-year">'+p.y+'</div>';

    var cover = document.createElement('div');
    cover.className = 'e-cover';
    var img = document.createElement('img');
    img.alt = '';
    cover.appendChild(img);

    row.appendChild(info);
    row.appendChild(cover);
    sec.appendChild(row);

    coverEls.push({ img:img, cover:cover, a:p.a, t:p.t, loaded:false });
  });

  content.appendChild(sec);
});

// ── lazy cover loading via iTunes API ───────────────────────────────
var queue = coverEls.slice();
var inFlight = 0;
var MAX = 3; // concurrent requests

function loadNext() {
  while(inFlight < MAX && queue.length > 0) {
    var item = queue.shift();
    if(!isVisible(item.img)) { queue.push(item); continue; }
    fetchCover(item);
  }
}

function isVisible(el) {
  var r = el.getBoundingClientRect();
  return r.top < window.innerHeight + 300;
}

function fetchCover(item) {
  if(item.loaded) return;
  item.loaded = true;
  inFlight++;
  var q = encodeURIComponent((item.a + ' ' + (item.t||'')).trim());
  var url = 'https://itunes.apple.com/search?term='+q+'&media=music&limit=1&entity=song&country=cl';
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(d){
      inFlight--;
      if(d.resultCount > 0 && d.results[0].artworkUrl100) {
        var art = d.results[0].artworkUrl100.replace('100x100bb','300x300bb');
        item.img.src = art;
        item.img.onload = function(){ item.img.classList.add('loaded'); };
      } else {
        item.cover.classList.add('no-art');
      }
      loadNext();
    })
    .catch(function(){
      inFlight--;
      item.cover.classList.add('no-art');
      loadNext();
    });
}

// start loading visible items + on scroll
function onScroll() { loadNext(); }
window.addEventListener('scroll', onScroll, {passive:true});
setTimeout(loadNext, 200);
