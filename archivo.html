var years = [];
DATA.forEach(function(p){ if(p.y > 0 && years.indexOf(p.y)<0) years.push(p.y); });
years.sort(function(a,b){ return b-a; });

var byYear = {};
DATA.forEach(function(p){
  var k = p.y > 0 ? p.y : 'otros';
  if(!byYear[k]) byYear[k]=[];
  byYear[k].push(p);
});

// filter
var filterEl = document.getElementById('filter');
function makeBtn(label, val) {
  var b = document.createElement('button');
  b.className = 'yr-btn' + (val==='all'?' on':'');
  b.textContent = label;
  b.onclick = function(){
    document.querySelectorAll('.yr-btn').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    document.querySelectorAll('.yr-section').forEach(function(s){
      s.classList.toggle('hidden', val!=='all' && s.dataset.year!==String(val));
    });
    if(val!=='all'){
      var sec=document.querySelector('.yr-section[data-year="'+val+'"]');
      if(sec) window.scrollTo({top: sec.getBoundingClientRect().top + window.scrollY - 48, behavior:'smooth'});
    }
  };
  return b;
}
filterEl.appendChild(makeBtn('TODOS','all'));
years.forEach(function(y){ filterEl.appendChild(makeBtn(y,y)); });

// content
var content = document.getElementById('content');
years.forEach(function(y){
  var items = byYear[y];
  if(!items || !items.length) return;

  var sec = document.createElement('div');
  sec.className = 'yr-section';
  sec.dataset.year = y;

  var hdr = document.createElement('div');
  hdr.className = 'yr-header';
  hdr.innerHTML = '<span class="yr-label">'+y+'</span><span class="yr-count">'+items.length+' track'+(items.length>1?'s':'')+'</span>';
  sec.appendChild(hdr);

  items.forEach(function(p){
    var row = document.createElement('div');
    row.className = 'entry';

    // cover
    var cover = document.createElement('div');
    cover.className = 'e-cover';
    var img = document.createElement('img');
    img.src = p.i;
    img.alt = p.a;
    img.loading = 'lazy';
    cover.appendChild(img);

    // info
    var info = document.createElement('div');
    info.className = 'e-info';
    info.innerHTML =
      '<div class="e-artist">'+p.a+'</div>'+
      '<div class="e-track">'+p.t+'</div>'+
      '<div class="e-meta">'+p.m+'</div>';

    row.appendChild(cover);
    row.appendChild(info);
    sec.appendChild(row);
  });

  content.appendChild(sec);
});
</script>
