<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover: activa safe-area en iPhone con notch/home indicator -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>ESTUDIONEGRO MASTERS</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html {
      -webkit-text-size-adjust:100%; /* evita que iOS infle texto al rotar */
      text-size-adjust:100%;
    }

    html, body {
      width:100%; height:100%;
      background:#fff;
      overflow:hidden;
    }

    .page {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      gap:10px;
      /* safe-area: respeta notch y home indicator en iPhone X+ */
      padding: max(18px, env(safe-area-inset-top))
               max(26px, env(safe-area-inset-right))
               max(16px, env(safe-area-inset-bottom))
               max(26px, env(safe-area-inset-left));
    }

    /* ── title ── */
    .title { flex-shrink:0; overflow:hidden; }
    .t1, .t2 {
      display:block;
      line-height:0.87;
      color:#000;
      font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
      font-weight:900;
      font-size:clamp(2.5rem, 11.5vw, 9rem);
      letter-spacing:-0.02em;
      transform:scaleX(0.96);
      transform-origin:left center;
    }

    .rule      { flex-shrink:0; width:100%; height:2px; background:#000; }
    .rule-thin { flex-shrink:0; width:100%; height:1px; background:#000; }

    /* ── dot panel ── */
    .dot-wrap {
      flex:1; min-height:0;
      background:#000;
      overflow:hidden;
    }
    canvas {
      display:block;
      /* pixelated: mantiene los dots nítidos en pantallas retina */
      image-rendering:pixelated;
      image-rendering:-webkit-optimize-contrast; /* Safari */
      image-rendering:crisp-edges;
    }

    /* ── footer ── */
    .footer {
      flex-shrink:0;
      display:flex; align-items:baseline;
      justify-content:space-between;
    }
    .nav { display:flex; gap:4vw; }
    .nav a {
      font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
      font-weight:900;
      /* min 1.4rem en vez de 1.8rem: evita overflow en iPhone SE / 375px */
      font-size:clamp(1.4rem, 4.5vw, 3.8rem);
      letter-spacing:-0.02em;
      color:#000;
      text-decoration:none;
      display:inline-block;
      white-space:nowrap; /* nunca rompe en dos líneas */
      transform:scaleX(0.96);
      transform-origin:left center;
      transition:opacity 0.15s;
      -webkit-tap-highlight-color:transparent; /* quita flash azul en Android */
      touch-action:manipulation; /* tap sin delay de 300ms */
    }
    .nav a:hover { opacity:0.28; }

    .nav-right {
      font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
      font-weight:900;
      font-size:clamp(1.4rem,4.5vw,3.8rem);
      letter-spacing:-0.02em;
      color:#000;
      text-decoration:none;
      display:inline-block;
      white-space:nowrap;
      transform:scaleX(0.96);
      transform-origin:right center;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      transition:opacity 0.15s;
    }
    .nav-right:hover { opacity:0.28; }
  </style>
</head>
<body>

<div class="page" id="page">

  <div class="title">
    <span class="t1">ESTUDIONEGRO</span>
    <span class="t2">MASTERS</span>
  </div>

  <div class="rule"></div>

  <div class="dot-wrap" id="dot-wrap">
    <canvas id="dots"></canvas>
  </div>

  <div class="rule-thin"></div>

  <div class="footer">
    <nav class="nav">
      <a href="portfolio.html">PORTAFOLIO</a>
      <a href="agenda.html">AGENDA</a>
    </nav>
    <a class="nav-right" href="https://app.notion.com/p/f5f1cf1f6e0945bfa12fdb5ca7e2666d?v=3832b71ad82b48b4b73558a4ab5766c1&source=copy_link" target="_blank" rel="noopener noreferrer">LEGACY</a>
  </div>

</div>

<script>
var SONGS_PER_MS = 100000 / 86400000;
var DAY_START    = (function(){ var d = new Date(); d.setHours(0,0,0,0); return d.getTime(); })();

function songsToday() { return Math.min(100000, Math.floor((Date.now() - DAY_START) * SONGS_PER_MS)); }
function fmtNum(n)    { return n.toLocaleString(); }

function fmtTime() {
  var d = new Date(), h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
  var ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + '.' + (m < 10 ? '0'+m : m) + '.' + (s < 10 ? '0'+s : s) + ' ' + ap;
}
function fmtDate() {
  var d = new Date();
  var dd = d.getDate() < 10 ? '0'+d.getDate() : ''+d.getDate();
  var mm = (d.getMonth()+1) < 10 ? '0'+(d.getMonth()+1) : ''+(d.getMonth()+1);
  return dd + ' ' + mm + ' ' + d.getFullYear();
}

var CELL = 3, DOT = 2;
var cv   = document.getElementById('dots');
var cx   = cv.getContext('2d');
var wrap = document.getElementById('dot-wrap');
var G = null, BASE = null, lastN = -1, lastSec = -1;
var TEXT_H = 62;

function setup() {
  var W = wrap.clientWidth, H = wrap.clientHeight;
  if (!W || !H) return;
  cv.width = W; cv.height = H;

  var DH   = H - TEXT_H;
  var cols = Math.floor(W  / CELL);
  var rows = Math.floor(DH / CELL);

  var buf = new Uint8ClampedArray(W * H * 4);
  for (var i = 3; i < buf.length; i += 4) buf[i] = 255;

  for (var row = 0; row < rows; row++) {
    for (var col = 0; col < cols; col++) {
      var x0 = col * CELL, y0 = row * CELL;
      for (var dy = 0; dy < DOT; dy++) {
        for (var dx = 0; dx < DOT; dx++) {
          var pi = ((y0 + dy) * W + (x0 + dx)) * 4;
          buf[pi] = buf[pi+1] = buf[pi+2] = 28;
        }
      }
    }
  }

  G    = { rows:rows, cols:cols, total:rows*cols, W:W, H:H, DH:DH };
  BASE = buf;
  lastN = lastSec = -1;
}

function render(n) {
  if (!G || !BASE) return;
  var g = G, W = g.W, H = g.H, DH = g.DH;

  var data   = new Uint8ClampedArray(BASE);
  var filled = Math.round(n / 100000 * g.total);

  for (var idx = 0; idx < filled && idx < g.total; idx++) {
    var row = Math.floor(idx / g.cols), col = idx % g.cols;
    var x0 = col * CELL, y0 = row * CELL;
    for (var dy = 0; dy < DOT; dy++) {
      for (var dx = 0; dx < DOT; dx++) {
        var pi = ((y0 + dy) * W + (x0 + dx)) * 4;
        data[pi] = data[pi+1] = data[pi+2] = 255;
      }
    }
  }

  cx.putImageData(new ImageData(data, W, H), 0, 0);

  var pad = 16;
  cx.textBaseline = 'alphabetic';

  cx.fillStyle = '#222';
  cx.fillRect(0, DH, W, 1);

  cx.font = '600 13px "Helvetica Neue", Helvetica, Arial, sans-serif';
  cx.fillStyle = '#e63030';
  cx.textAlign = 'left';
  cx.fillText('LANZAMIENTOS GLOBALES HOY', pad, DH + 22);

  cx.font = '700 24px "Helvetica Neue", Helvetica, Arial, sans-serif';
  cx.fillStyle = '#ffffff';
  cx.textAlign = 'left';
  cx.fillText(fmtNum(n) + ' \u25AA', pad, DH + 50);

  cx.font = '400 12px "Helvetica Neue", Helvetica, Arial, sans-serif';
  cx.fillStyle = '#555';
  cx.textAlign = 'right';
  cx.fillText(fmtTime() + '    ' + fmtDate(), W - pad, DH + 50);
  cx.textAlign = 'left';
}

function loop() {
  requestAnimationFrame(loop);
  var n = songsToday(), s = new Date().getSeconds();
  if (n !== lastN || s !== lastSec) { render(n); lastN = n; lastSec = s; }
}

setup();
try { new ResizeObserver(setup).observe(wrap); } catch(e) { window.addEventListener('resize', setup); }
requestAnimationFrame(loop);
</script>

</body>
</html>
